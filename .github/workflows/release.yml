name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2025-vs2026
            name: Windows-x64
            prune_platform: win32
            builder_target: win
            arch: x64
          - os: macos-latest
            name: macOS-arm64
            prune_platform: darwin
            builder_target: mac
            arch: arm64
          - os: macos-latest
            name: macOS-x64
            prune_platform: darwin
            builder_target: mac
            arch: x64
          - os: ubuntu-24.04-arm
            name: Linux-arm64
            prune_platform: linux
            builder_target: linux
            arch: arm64
          - os: ubuntu-latest
            name: Linux-x64
            prune_platform: linux
            builder_target: linux
            arch: x64

    env:
      # 未配置签名证书时跳过自动签名探测，避免 CI 失败
      CSC_IDENTITY_AUTO_DISCOVERY: false
      # Linux x64 上 onnxruntime-node postinstall 会拉取 CUDA EP（约 300MB+）；内置向量仅用 CPU
      ONNXRUNTIME_NODE_INSTALL_CUDA: skip
      COLORTXT_PRUNE_PLATFORM: ${{ matrix.prune_platform }}
      COLORTXT_PRUNE_ARCH: ${{ matrix.arch }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: npm

      - name: Verify tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION=$(node -p "require('./package.json').version")
          if [ "v${VERSION}" != "${TAG}" ]; then
            echo "Tag ${TAG} does not match package.json version ${VERSION}"
            exit 1
          fi

      - name: Cache Electron downloads
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
          key: electron-${{ runner.os }}-${{ matrix.arch }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            electron-${{ runner.os }}-${{ matrix.arch }}-
            electron-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npx electron-vite build

      - name: Prune pack dependencies
        run: node scripts/prune-pack-deps.mjs --platform ${{ matrix.prune_platform }} --arch ${{ matrix.arch }}

      - name: Log node_modules size after prune
        if: matrix.name == 'Linux-x64'
        run: |
          du -sh node_modules
          find node_modules -maxdepth 1 -name 'sqlite-vec-*' | xargs du -sh 2>/dev/null || true
          du -sh node_modules/onnxruntime-node/bin/napi-v3/* 2>/dev/null || true

      - name: Package
        run: npx electron-builder --publish never --${{ matrix.builder_target }} --${{ matrix.arch }}

      - name: Verify Linux x64 package size
        if: matrix.name == 'Linux-x64'
        shell: bash
        run: |
          appimage=(release/*.AppImage)
          size=$(stat -c%s "${appimage[0]}")
          echo "AppImage size: $(( size / 1024 / 1024 )) MB"
          if [ "$size" -gt 200000000 ]; then
            echo "Linux x64 AppImage exceeds 200 MB — prune or pack regression"
            exit 1
          fi

      - name: Remove builder debug metadata
        shell: bash
        run: rm -f release/builder-debug.yml

      - name: Upload release artifacts
        uses: actions/upload-artifact@v6
        with:
          name: release-${{ matrix.name }}
          path: |
            release/*.exe
            release/*.dmg
            release/*.AppImage
            release/*.blockmap
            release/*.yml
          if-no-files-found: error

  publish:
    name: Publish to GitHub Releases
    needs: build
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install electron-builder
        run: npm ci --ignore-scripts

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: release-*
          merge-multiple: true

      - name: Collect release assets
        shell: bash
        run: |
          mkdir -p release
          find artifacts -type f \( \
            -name '*.exe' -o -name '*.dmg' -o -name '*.AppImage' -o \
            -name '*.blockmap' -o \
            \( -name '*.yml' ! -name 'builder-debug.yml' \) \
          \) -exec cp -t release/ {} +

      - name: Publish to GitHub Releases
        shell: bash
        run: |
          shopt -s nullglob
          args=()
          for f in release/*; do
            args+=(--files "$f")
          done
          if [ ${#args[@]} -eq 0 ]; then
            echo "No release files found"
            ls -laR release artifacts 2>/dev/null || true
            exit 1
          fi
          npx electron-builder publish --policy always "${args[@]}"
